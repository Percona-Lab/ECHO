# ECHO BFF - Zoom OAuth token exchange proxy
# Path-based routing under SHERPA's existing hostname so we don't need a
# dedicated DNS record. Clients hit /echo-bff/exchange, /echo-bff/refresh,
# /echo-bff/health.

server {
    listen 80;
    server_name sherpa.tp.int.percona.com sherpa.int.percona.com;

    location /echo-bff/ {
        # Strip the /echo-bff prefix before forwarding
        rewrite ^/echo-bff/(.*)$ /$1 break;
        proxy_pass http://127.0.0.1:3100;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # Small, JSON-only; keep request body small to reduce abuse surface
        client_max_body_size 8k;
    }
}
